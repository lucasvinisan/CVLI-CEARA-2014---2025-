<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard/style/style.css">
    <title>Dashboard CVLI Ceará</title>
</head>
<body>

    <div class="div_inicio">
        <h1 >Uma Análise descritiva dos CVLI Estado do Ceará (2014 - 2025)</h1>
    </div>

    <div class='tableauPlaceholder' id='dashboard_tableau'>
        <object class='tableauViz' style='display:none;'>
            <param name='host_url' value='https%3A%2F%2Fpublic.tableau.com%2F' />
            <param name='embed_code_version' value='3' />
            <param name='site_root' value='' />
            <param name='name' value='detalhe_cvli&#47;Dashboard1' />
            <param name='tabs' value='no' />
            <param name='toolbar' value='no' />
            <param name='static_img' value='yes' />
            <param name='language' value='pt-BR' />
        </object>
    </div>

    <script>
        var divElement = document.getElementById('dashboard_tableau');
        var vizElement = divElement.getElementsByTagName('object')[0];
        
        vizElement.style.width = '100%';
        vizElement.style.height = '100%';

        var scriptElement = document.createElement('script');
        scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';
        vizElement.parentNode.insertBefore(scriptElement, vizElement);
    </script>
</body>
</html>
